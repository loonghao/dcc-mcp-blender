name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff>=0.8.0
      - name: Ruff check
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/

  lint-skills:
    name: Lint SKILL.md files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Validate SKILL.md front-matter
        run: python tests/test_lint_skills.py

  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.7", "3.10", "3.11", "3.12"]
        exclude:
          # Reduce CI time — only test 3.7 and 3.10 on linux
          - os: windows-latest
            python-version: "3.7"
          - os: windows-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.7"
          - os: macos-latest
            python-version: "3.10"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          # On Python <3.9, some dev deps (pytest-cov, pytest-mock) are
          # unavailable — install only what we need for the test run.
          if python -c "import sys; sys.exit(0 if sys.version_info >= (3,9) else 1)"; then
            pip install -e ".[dev]"
          else
            pip install -e . "pytest>=7.0" "pyyaml>=5.0"
          fi

      - name: Run unit tests
        run: pytest tests/ -v --tb=short -m "not e2e and not packaging"
